server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache control for static assets (EXCLUDES service worker files)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|mp3)$ {
        # Exclude service worker files from long-term caching
        if ($uri ~* "^/(sw|workbox).*\.js$") {
            set $skip_cache 1;
        }
        
        # Only apply long cache if not a service worker file
        if ($skip_cache != 1) {
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Service Worker files - NO CACHING (critical for updates)
    location ~* ^/(sw|workbox).*\.js$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Service-Worker "true";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
